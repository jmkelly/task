name: Release Assets

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to upload binaries to (e.g. v1.0.0.52). Defaults to v<Version> from Task.Cli.csproj.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build and upload ${{ matrix.rid }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            runner: ubuntu-latest
            binary_name: Task.Cli
            asset_name: task-linux-x64.zip
            archive: zip
          - rid: win-x64
            runner: windows-latest
            binary_name: Task.Cli.exe
            asset_name: task-win-x64.exe
            archive: none
          - rid: osx-x64
            runner: macos-15-intel
            binary_name: Task.Cli
            asset_name: task-osx-x64.zip
            archive: zip
          - rid: osx-arm64
            runner: macos-14
            binary_name: Task.Cli
            asset_name: task-osx-arm64.zip
            archive: zip

    steps:
      - name: Check out source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: resolve_tag
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.release_tag }}" ]; then
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(python3 -c "
import xml.etree.ElementTree as ET, sys
version = ET.parse('Task.Cli/Task.Cli.csproj').getroot().findtext('.//Version')
if not version:
    sys.exit('Task.Cli/Task.Cli.csproj is missing a <Version> element.')
print(version.strip())
")
            if [ -z "$VERSION" ]; then
              echo "Failed to resolve release tag: no version found in Task.Cli.csproj" >&2
              exit 1
            fi
            echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release if needed
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.resolve_tag.outputs.tag }}
        run: |
          set -euo pipefail

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release already exists for $TAG"
          else
            gh release create "$TAG" --title "$TAG" --notes ""
          fi

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Task.Cli/Task.Cli.csproj

      - name: Publish
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:RUNNER_TEMP "publish-${{ matrix.rid }}"
          Remove-Item -LiteralPath $publishDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $publishDir -Force | Out-Null

          dotnet publish Task.Cli/Task.Cli.csproj `
            -c Release `
            -r ${{ matrix.rid }} `
            --self-contained `
            -p:PublishSingleFile=true `
            -p:PublishTrimmed=false `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:IncludeAllContentForSelfExtract=true `
            -o $publishDir

      - name: Package zip asset
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:RUNNER_TEMP "publish-${{ matrix.rid }}"
          $binaryPath = Join-Path $publishDir "${{ matrix.binary_name }}"
          $assetPath = Join-Path $env:RUNNER_TEMP "${{ matrix.asset_name }}"

          if (-not (Test-Path -LiteralPath $binaryPath)) {
            throw "Expected binary not found: $binaryPath"
          }

          if (Test-Path -LiteralPath $assetPath) {
            Remove-Item -LiteralPath $assetPath -Force
          }

          Compress-Archive -Path $binaryPath -DestinationPath $assetPath

      - name: Package exe asset
        if: matrix.archive == 'none'
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:RUNNER_TEMP "publish-${{ matrix.rid }}"
          $binaryPath = Join-Path $publishDir "${{ matrix.binary_name }}"
          $assetPath = Join-Path $env:RUNNER_TEMP "${{ matrix.asset_name }}"

          if (-not (Test-Path -LiteralPath $binaryPath)) {
            throw "Expected binary not found: $binaryPath"
          }

          Copy-Item -LiteralPath $binaryPath -Destination $assetPath -Force

      - name: Upload asset to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.resolve_tag.outputs.tag }}
          ASSET_PATH: ${{ runner.temp }}/${{ matrix.asset_name }}
        run: |
          set -euo pipefail
          gh release upload "$TAG" "$ASSET_PATH" --clobber
